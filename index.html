      <script>
        (() => {
          try {
            const dir = localStorage.getItem('c2hub.direction');
            if (dir === 'ltr' || dir === 'rtl') {
              document.documentElement.dir = dir;
              document.documentElement.lang = dir === 'rtl' ? 'he' : 'en';
            }
          } catch {}
        })();
      </script>
